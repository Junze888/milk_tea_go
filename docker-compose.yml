services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: milktea
      POSTGRES_PASSWORD: milktea
      POSTGRES_DB: milktea
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U milktea -d milktea"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: prod
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: postgres://milktea:milktea@postgres:5432/milktea?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-32bytes!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-32bytes!}
      PG_MAX_CONNS: "120"
      REDIS_POOL_SIZE: "200"
      RATE_LIMIT_RPS: "200"
      RATE_LIMIT_BURST: "400"
    ports:
      - "8080:8080"

volumes:
  pgdata:
